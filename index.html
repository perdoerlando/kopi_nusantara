<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Pribadi</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(to right,#141e30,#243b55);
      color:white;
    }

    .card{
      width:350px;
      background:rgba(255,255,255,0.1);
      padding:40px;
      border-radius:20px;
      text-align:center;
      backdrop-filter:blur(10px);
      box-shadow:0 0 20px rgba(0,0,0,0.3);
    }

    .profile-img{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid white;
      margin-bottom:20px;
    }

    h1{
      margin-bottom:10px;
      font-size:30px;
    }

    p{
      margin-bottom:20px;
      color:#ddd;
    }

    .btn{
      display:inline-block;
      padding:12px 20px;
      margin:5px;
      background:#ff9800;
      color:white;
      text-decoration:none;
      border-radius:10px;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
      background:#ffb74d;
    }

  </style>
</head>

<body>

  <div class="card">

    <img src="foto.jpg.jpg" class="profile-img">

    <h1>Erlando Aviero</h1>

    <p>
      Halo, saya seorang mahasiswa yang sangat berbahaya.
    </p>

    <a href="#" class="btn">iqperdo</a>

    <a href="#" class="btn">erlandooo</a>

    <a href="#" class="btn">082341638507</a>

  </div>

</body>
</html>
